<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuevo anuncio - AMPAgo</title>
  <link rel="stylesheet" href="/gestor-extraescolares/style.css">

  <style>
    .nav-container {
      margin: 10px 0 20px 0;
    }
    .nav-btn {
      background: #eee;
      border: 1px solid #ccc;
      padding: 6px 12px;
      margin-right: 10px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<header>Nuevo anuncio</header>

<div class="container">

  <!-- Navegación universal -->
  <div class="nav-container">
    <button id="btnVolver" class="nav-btn">Volver</button>
    <button id="btnInicio" class="nav-btn">Inicio</button>
  </div>

  <h2>Crear anuncio</h2>

  <input id="titulo" type="text" placeholder="Título del anuncio">
  <textarea id="mensaje" placeholder="Mensaje"></textarea>

  <button id="btnGuardar">Publicar</button>

</div>

<script type="module">
import { supabase } from "/gestor-extraescolares/js/supabaseclientes.js";

/* ================= NAVEGACIÓN UNIVERSAL ================= */
async function navegar() {
  const esInvitado = sessionStorage.getItem("invitado") === "true";

  if (esInvitado) {
    location.href = "/gestor-extraescolares/invitado.html";
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    location.href = "/gestor-extraescolares/login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .maybeSingle();

  switch (profile?.role) {
    case "admin": location.href = "/gestor-extraescolares/admin.html"; break;
    case "monitor": location.href = "/gestor-extraescolares/monitor.html"; break;
    case "familiar": location.href = "/gestor-extraescolares/familiar.html"; break;
    default: location.href = "/gestor-extraescolares/login.html";
  }
}

document.getElementById("btnVolver").onclick = navegar;
document.getElementById("btnInicio").onclick = navegar;

/* ================= SESIÓN ================= */
const { data: { user } } = await supabase.auth.getUser();
const esInvitado = sessionStorage.getItem("invitado") === "true";

if (!user && !esInvitado) {
  location.href = "/gestor-extraescolares/login.html";
}

/* ================= PERMISOS ================= */
const { data: profile } = await supabase
  .from("profiles")
  .select("role")
  .eq("id", user.id)
  .maybeSingle();

if (!profile || !["admin", "monitor"].includes(profile.role)) {
  alert("Solo administradores y monitores pueden publicar anuncios");
  location.href = "/gestor-extraescolares/anuncios.html";
}

/* ================= GUARDAR ================= */
document.getElementById("btnGuardar").onclick = async () => {
  const titulo = document.getElementById("titulo").value.trim();
  const mensaje = document.getElementById("mensaje").value.trim();

  if (!titulo) return alert("El título es obligatorio");
  if (!mensaje) return alert("El mensaje es obligatorio");

  const { error } = await supabase
    .from("anuncios")
    .insert({
      titulo,
      mensaje,
      fecha: new Date(),
      autor_id: user.id
    });

  if (error) {
    console.error(error);
    alert("Error publicando anuncio");
    return;
  }

  location.href = "/gestor-extraescolares/anuncios.html";
};
</script>

</body>
</html>

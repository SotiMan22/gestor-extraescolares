<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis alumnos - AMPAgo</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .card p {
      margin: 4px 0;
    }

    .nav-container {
      margin: 10px 0 20px 0;
    }

    .nav-btn {
      background: #eee;
      border: 1px solid #ccc;
      padding: 6px 12px;
      margin-right: 10px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<header>
  Mis alumnos

  <div class="profile-menu">
    <img src="../img/user.png" class="profile-icon" id="profileToggle">

    <div class="profile-dropdown" id="profileDropdown">
      <p id="profileEmail"></p>
      <p id="profileRole"></p>
      <button id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>
</header>

<div class="container">

  <!-- Botones de navegación debajo del título -->
  <div class="nav-container">
    <button id="btnVolver" class="nav-btn">Volver</button>
    <button id="btnInicio" class="nav-btn">Inicio</button>
  </div>

  <h2 id="titulo">Alumnos</h2>

  <div id="lista"></div>

</div>

<script type="module">
import { supabase } from "../js/supabaseclientes.js";

/* ================= NAVEGACIÓN UNIVERSAL ================= */
async function navegar() {
  const esInvitado = sessionStorage.getItem("invitado") === "true";

  if (esInvitado) {
    location.href = "invitado.html";
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    location.href = "login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .maybeSingle();

  switch (profile?.role) {
    case "admin": location.href = "admin.html"; break;
    case "monitor": location.href = "monitor.html"; break;
    case "familiar": location.href = "familiar.html"; break;
    default: location.href = "login.html";
  }
}

document.getElementById("btnVolver").onclick = navegar;
document.getElementById("btnInicio").onclick = navegar;

/* ================= SESIÓN ================= */
const { data: { user } } = await supabase.auth.getUser();

if (!user) {
  location.href = "login.html";
}

/* ================= PERFIL ================= */
const { data: profile } = await supabase
  .from("profiles")
  .select("role")
  .eq("id", user.id)
  .maybeSingle();

if (!profile) {
  alert("No se pudo cargar el perfil");
  location.href = "login.html";
}

if (profile.role !== "monitor") {
  alert("Solo los monitores pueden acceder");
  location.href = "login.html";
}

/* ================= UI PERFIL ================= */
document.getElementById("profileEmail").textContent = user.email || "";
document.getElementById("profileRole").textContent = "Rol: " + profile.role;

/* ================= MENÚ PERFIL ================= */
document.getElementById("profileToggle").onclick = () => {
  const d = document.getElementById("profileDropdown");
  d.style.display = d.style.display === "block" ? "none" : "block";
};

document.addEventListener("click", (e) => {
  if (!e.target.closest(".profile-menu")) {
    document.getElementById("profileDropdown").style.display = "none";
  }
});

/* ================= LOGOUT ================= */
document.getElementById("logoutBtn").onclick = async () => {
  await supabase.auth.signOut();
  location.href = "login.html";
};

/* ================= ID ACTIVIDAD ================= */
const params = new URLSearchParams(window.location.search);
const actividad_id = params.get("id");

if (!actividad_id) {
  alert("Falta el ID de la actividad");
  location.href = "mis-actividades.html";
}

/* ================= VERIFICAR ACTIVIDAD ================= */
const { data: actividad } = await supabase
  .from("actividades")
  .select("id, nombre, monitor_id")
  .eq("id", actividad_id)
  .maybeSingle();

if (!actividad || actividad.monitor_id !== user.id) {
  alert("No tienes permiso para ver esta actividad");
  location.href = "mis-actividades.html";
}

document.getElementById("titulo").textContent = actividad.nombre;

/* ================= CARGAR ALUMNOS ================= */
async function cargarAlumnos() {

  const { data, error } = await supabase
    .from("inscripciones")
    .select(`
      alumnos (
        nombre,
        apellidos,
        curso
      )
    `)
    .eq("actividad_id", actividad_id);

  const cont = document.getElementById("lista");

  if (error) {
    console.error(error);
    cont.innerHTML = "<p>Error cargando alumnos.</p>";
    return;
  }

  if (!data || data.length === 0) {
    cont.innerHTML = "<p>No hay alumnos inscritos.</p>";
    return;
  }

  cont.innerHTML = data.map(i => `
    <div class="card">
      <p><strong>${i.alumnos?.nombre || ""} ${i.alumnos?.apellidos || ""}</strong></p>
      <p>Curso: <strong>${i.alumnos?.curso || "Sin curso"}</strong></p>
    </div>
  `).join("");
}

cargarAlumnos();
</script>

</body>
</html>

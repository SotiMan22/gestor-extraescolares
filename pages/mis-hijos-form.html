<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hijo - AMPAgo</title>
  <link rel="stylesheet" href="/gestor-extraescolares/style.css">

  <style>
    .nav-container {
      margin: 10px 0 20px 0;
    }
    .nav-btn {
      background: #eee;
      border: 1px solid #ccc;
      padding: 6px 12px;
      margin-right: 10px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<header>Hijo</header>

<div class="container">

  <!-- Botones de navegación debajo del título -->
  <div class="nav-container">
    <button id="btnVolver" class="nav-btn">Volver</button>
    <button id="btnInicio" class="nav-btn">Inicio</button>
  </div>

  <h2 id="titulo">Añadir hijo</h2>

  <input id="nombre" type="text" placeholder="Nombre">
  <input id="apellidos" type="text" placeholder="Apellidos">
  <input id="curso" type="text" placeholder="Curso (opcional)">
  <input id="fecha_nacimiento" type="date">

  <button id="btnGuardar">Guardar</button>

  <!-- Este botón solo aparece en modo edición -->
  <button id="btnInscribir" style="display:none;">Inscribir en actividades</button>

</div>

<script type="module">
import { supabase } from "/gestor-extraescolares/js/supabaseclientes.js";

/* ================= NAVEGACIÓN UNIVERSAL ================= */
async function navegar() {
  const esInvitado = sessionStorage.getItem("invitado") === "true";

  if (esInvitado) {
    location.href = "/gestor-extraescolares/invitado.html";
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    location.href = "/gestor-extraescolares/login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .maybeSingle();

  switch (profile?.role) {
    case "admin": location.href = "/gestor-extraescolares/admin.html"; break;
    case "monitor": location.href = "/gestor-extraescolares/monitor.html"; break;
    case "familiar": location.href = "/gestor-extraescolares/familiar.html"; break;
    default: location.href = "/gestor-extraescolares/login.html";
  }
}

document.getElementById("btnVolver").onclick = navegar;
document.getElementById("btnInicio").onclick = navegar;

/* ================= SESIÓN ================= */
const { data: { user } } = await supabase.auth.getUser();

if (!user) {
  location.href = "/gestor-extraescolares/login.html";
}

/* ================= PERFIL ================= */
const { data: profile } = await supabase
  .from("profiles")
  .select("role")
  .eq("id", user.id)
  .maybeSingle();

if (!profile || profile.role !== "familiar") {
  alert("Solo los familiares pueden acceder");
  location.href = "/gestor-extraescolares/login.html";
}

/* ================= ID HIJO ================= */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* ================= MODO EDICIÓN ================= */
if (id) {
  document.getElementById("titulo").textContent = "Editar hijo";
  document.getElementById("btnInscribir").style.display = "inline-block";
  cargarHijo();
}

/* ================= CARGAR HIJO ================= */
async function cargarHijo() {

  const { data: hijo, error } = await supabase
    .from("alumnos")
    .select("*")
    .eq("id", id)
    .eq("familiar_id", user.id)
    .maybeSingle();

  if (error || !hijo) {
    alert("Error cargando hijo");
    location.href = "/gestor-extraescolares/mis-hijos.html";
    return;
  }

  document.getElementById("nombre").value = hijo.nombre || "";
  document.getElementById("apellidos").value = hijo.apellidos || "";
  document.getElementById("curso").value = hijo.curso || "";
  document.getElementById("fecha_nacimiento").value = hijo.fecha_nacimiento || "";
}

/* ================= GUARDAR ================= */
document.getElementById("btnGuardar").onclick = async () => {

  const nombre = document.getElementById("nombre").value.trim();
  const apellidos = document.getElementById("apellidos").value.trim();
  const curso = document.getElementById("curso").value.trim() || null;
  const fecha_nacimiento = document.getElementById("fecha_nacimiento").value || null;

  if (!nombre || !apellidos) {
    alert("Nombre y apellidos son obligatorios");
    return;
  }

  const datos = {
    nombre,
    apellidos,
    curso,
    fecha_nacimiento,
    familiar_id: user.id
  };

  let error;

  if (id) {
    const res = await supabase
      .from("alumnos")
      .update(datos)
      .eq("id", id)
      .eq("familiar_id", user.id);

    error = res.error;

  } else {
    const res = await supabase
      .from("alumnos")
      .insert([datos]);

    error = res.error;
  }

  if (error) {
    console.error(error);
    alert("Error guardando hijo");
    return;
  }

  location.href = "/gestor-extraescolares/mis-hijos.html";
};

/* ================= INSCRIBIR EN ACTIVIDADES ================= */
document.getElementById("btnInscribir").onclick = () => {
  location.href = `/gestor-extraescolares/mis-hijos-actividades.html?id=${id}`;
};
</script>

</body>
</html>

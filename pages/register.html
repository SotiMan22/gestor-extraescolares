<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear cuenta - AMPAgo</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<header>AMPAgo</header>

<div class="container">

  <h2>Crear cuenta (solo admin)</h2>

  <input id="nombre" type="text" placeholder="Nombre">
  <input id="apellidos" type="text" placeholder="Apellidos">
  <input id="email" type="email" placeholder="Correo electrónico">
  <input id="password" type="password" placeholder="Contraseña">

  <select id="role">
    <option value="familiar">Familiar</option>
    <option value="monitor">Monitor</option>
  </select>

  <button id="btnRegister">Crear cuenta</button>
  <button onclick="location.href='admin.html'">Volver</button>

</div>

<script type="module">
import { supabase } from "../js/supabaseclientes.js";

/* ============================================================
   1. VERIFICAR SESIÓN
   ============================================================ */
const { data: { user } } = await supabase.auth.getUser();

if (!user) {
  location.href = "login.html";
}

/* ============================================================
   2. VERIFICAR ADMIN
   ============================================================ */
const { data: profile } = await supabase
  .from("profiles")
  .select("role")
  .eq("id", user.id)
  .maybeSingle();

if (!profile || profile.role !== "admin") {
  alert("Solo el administrador puede crear cuentas");
  location.href = "login.html";
}

/* ============================================================
   3. CREAR USUARIO (SIN AUTO LOGIN)
   ============================================================ */
document.getElementById("btnRegister").onclick = async () => {

  const nombre = document.getElementById("nombre").value.trim();
  const apellidos = document.getElementById("apellidos").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  if (!nombre || !apellidos || !email || !password) {
    alert("Completa todos los campos");
    return;
  }

  if (!email.includes("@")) {
    alert("Email inválido");
    return;
  }

  const btn = document.getElementById("btnRegister");
  btn.disabled = true;
  btn.textContent = "Creando...";

  try {

    /* 1. Crear usuario en Auth */
    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) throw error;

    const newUser = data.user;

    if (!newUser) {
      throw new Error("No se pudo crear el usuario");
    }

    /* 2. Crear perfil */
    const { error: profileError } = await supabase
      .from("profiles")
      .insert({
        id: newUser.id,
        email,
        nombre,
        apellidos,
        role
      });

    if (profileError) throw profileError;

    /* 3. 🔥 IMPORTANTE: evitar login automático */
    await supabase.auth.signOut();

    alert("Cuenta creada correctamente");

    location.href = "admin.html";

  } catch (err) {
    console.error(err);
    alert("Error: " + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Crear cuenta";
  }
};

</script>

</body>
</html>

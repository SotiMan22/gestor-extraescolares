<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AMPAgo</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<header>AMPAgo</header>

<div class="container">
  <p id="status">Comprobando sesión...</p>
</div>

<script type="module">
import { supabase } from "../js/supabaseclientes.js";

/* ============================================================
   1. SESIÓN (UNIFICADO CON EL RESTO DEL PROYECTO)
   ============================================================ */
const { data: { user } } = await supabase.auth.getUser();

const status = document.getElementById("status");

if (!user) {
  location.href = "login.html";
}

/* ============================================================
   2. PERFIL
   ============================================================ */
const { data: profile, error } = await supabase
  .from("profiles")
  .select("role")
  .eq("id", user.id)
  .maybeSingle();

if (error) {
  console.error(error);
  alert("Error cargando perfil");
  await supabase.auth.signOut();
  location.href = "login.html";
}

/* ============================================================
   3. VALIDACIÓN DE PERFIL
   ============================================================ */
if (!profile) {
  alert("Perfil no encontrado");
  await supabase.auth.signOut();
  location.href = "login.html";
}

/* ============================================================
   4. REDIRECCIÓN SEGÚN ROL
   ============================================================ */
status.textContent = "Redirigiendo...";

switch (profile.role) {
  case "admin":
    location.href = "admin.html";
    break;

  case "monitor":
    location.href = "monitor.html";
    break;

  case "familiar":
    location.href = "familiar.html";
    break;

  default:
    alert("Rol desconocido");
    await supabase.auth.signOut();
    location.href = "login.html";
}
</script>

</body>
</html>

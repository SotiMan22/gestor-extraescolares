<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Actividades - AMPAgo</title>
  <link rel="stylesheet" href="/gestor-extraescolares/style.css">

  <style>
    .seleccionada {
      background-color: #d0ebff !important;
    }
    #tablaActividades tr {
      cursor: pointer;
    }
    .nav-container {
      margin: 10px 0 20px 0;
    }
    .nav-btn {
      background: #eee;
      border: 1px solid #ccc;
      padding: 6px 12px;
      margin-right: 10px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<header>
  Actividades
</header>

<div class="container">

  <!-- Botones de navegación debajo del título -->
  <div class="nav-container">
    <button id="btnVolver" class="nav-btn">Volver</button>
    <button id="btnInicio" class="nav-btn">Inicio</button>
  </div>

  <h2>Lista de actividades</h2>

  <input id="buscador" type="text" placeholder="Buscar actividad...">

  <div id="adminControls" style="display:none; margin-top:10px;">
    <button id="btnCrear">Crear actividad</button>
    <button id="btnModificar" disabled>Modificar</button>
    <button id="btnEliminar" disabled>Eliminar</button>
  </div>

  <table id="tablaActividades">
    <thead>
      <tr>
        <th></th>
        <th>Nombre</th>
        <th>Día 1</th>
        <th>Día 2</th>
        <th>Descripción</th>
        <th>Monitor</th>
        <th>Material</th>
        <th>Zona</th>
      </tr>
    </thead>

    <tbody id="tbodyActividades">
      <tr><td colspan="8">Cargando actividades...</td></tr>
    </tbody>
  </table>

</div>

<div id="modalEliminar" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Confirmar eliminación</h3>

    <button id="confirmarEliminar">Sí, eliminar</button>
    <button id="cancelarEliminar">Cancelar</button>
  </div>
</div>

<script type="module">
import { supabase } from "/gestor-extraescolares/js/supabaseclientes.js";

/* ================= NAVEGACIÓN UNIVERSAL ================= */
async function navegar() {
  const esInvitado = sessionStorage.getItem("invitado") === "true";

  if (esInvitado) {
    location.href = "/gestor-extraescolares/invitado.html";
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    location.href = "/gestor-extraescolares/login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .maybeSingle();

  switch (profile?.role) {
    case "admin": location.href = "/gestor-extraescolares/admin.html"; break;
    case "monitor": location.href = "/gestor-extraescolares/monitor.html"; break;
    case "familiar": location.href = "/gestor-extraescolares/familiar.html"; break;
    default: location.href = "/gestor-extraescolares/login.html";
  }
}

document.getElementById("btnVolver").onclick = navegar;
document.getElementById("btnInicio").onclick = navegar;

/* ================= SESIÓN ================= */
const { data: { user } } = await supabase.auth.getUser();
const esInvitado = sessionStorage.getItem("invitado") === "true";

let profile = null;
let puedeGestionar = false;

if (!user && !esInvitado) {
  location.href = "/gestor-extraescolares/login.html";
}

/* ================= PERFIL ================= */
if (user && !esInvitado) {
  const { data: perfilData, error: perfilError } = await supabase
    .from("profiles")
    .select("email, role")
    .eq("id", user.id)
    .maybeSingle();

  if (perfilError) {
    console.error(perfilError);
    alert("No se pudo cargar el perfil");
    location.href = "/gestor-extraescolares/login.html";
  }

  profile = perfilData;
  puedeGestionar = (profile?.role === "admin" || profile?.role === "monitor");
}

/* ================= CONTROLES ADMIN/MONITOR ================= */
if (puedeGestionar) {
  document.getElementById("adminControls").style.display = "block";
}

/* ================= CARGAR ACTIVIDADES ================= */
let actividades = [];
let seleccionada = null;

async function cargarActividades() {

  const { data, error } = await supabase
    .from("actividades")
    .select("*")
    .order("nombre");

  if (error) {
    console.error(error);
    document.getElementById("tbodyActividades").innerHTML =
      `<tr><td colspan="8">Error cargando actividades</td></tr>`;
    return;
  }

  actividades = data || [];
  pintarTabla(actividades);
}

/* ================= TABLA ================= */
async function pintarTabla(lista) {

  const tbody = document.getElementById("tbodyActividades");

  if (!lista.length) {
    tbody.innerHTML = `<tr><td colspan="8">No hay actividades</td></tr>`;
    return;
  }

  let html = "";

  for (const a of lista) {

    /* === MATERIAL === */
    let nombreMaterial = "Ninguno";

    if (a.material_id) {
      const { data: mat } = await supabase
        .from("materiales")
        .select("nombre")
        .eq("id", a.material_id)
        .maybeSingle();

      if (mat) nombreMaterial = mat.nombre;
    }

    /* === MONITOR === */
    const { data: monitor } = await supabase
      .from("monitores")
      .select("nombre, apellidos")
      .eq("id", a.monitor_id)
      .maybeSingle();

    const nombreMonitor = monitor
      ? `${monitor.nombre} ${monitor.apellidos || ""}`.trim()
      : "Sin monitor";

    /* === ZONA === */
    const { data: zona } = await supabase
      .from("zonas")
      .select("nombre")
      .eq("id", a.zona_id)
      .maybeSingle();

    const nombreZona = zona?.nombre || "Sin zona";

    html += `
      <tr data-id="${a.id}">
        <td></td>
        <td>${a.nombre}</td>
        <td>${a.dia1 || ""}</td>
        <td>${a.dia2 || ""}</td>
        <td>${a.descripcion || ""}</td>
        <td>${nombreMonitor}</td>
        <td>${nombreMaterial}</td>
        <td>${nombreZona}</td>
      </tr>
    `;
  }

  tbody.innerHTML = html;

  document.querySelectorAll("#tablaActividades tbody tr").forEach(tr => {
    tr.addEventListener("click", () => seleccionarFila(tr));
  });
}

/* ================= SELECCIÓN ================= */
function seleccionarFila(tr) {

  document.querySelectorAll("#tablaActividades tr")
    .forEach(r => r.classList.remove("seleccionada"));

  tr.classList.add("seleccionada");

  seleccionada = tr.dataset.id;

  if (puedeGestionar) {
    document.getElementById("btnModificar").disabled = false;
    document.getElementById("btnEliminar").disabled = false;
  }
}

/* ================= BUSCADOR ================= */
document.getElementById("buscador").oninput = (e) => {

  const texto = e.target.value.toLowerCase();

  const filtradas = actividades.filter(a =>
    (a.nombre || "").toLowerCase().includes(texto) ||
    (a.descripcion || "").toLowerCase().includes(texto)
  );

  pintarTabla(filtradas);
};

/* ================= BOTONES ================= */
document.getElementById("btnCrear").onclick = () => {
  location.href = "/gestor-extraescolares/actividades-form.html";
};

document.getElementById("btnModificar").onclick = () => {
  if (seleccionada) {
    location.href = `/gestor-extraescolares/actividades-form.html?id=${seleccionada}`;
  }
};

document.getElementById("btnEliminar").onclick = () => {
  if (!seleccionada) return;
  document.getElementById("modalEliminar").style.display = "block";
};

document.getElementById("cancelarEliminar").onclick = () => {
  document.getElementById("modalEliminar").style.display = "none";
};

document.getElementById("confirmarEliminar").onclick = async () => {

  if (!seleccionada) return;

  const { error } = await supabase
    .from("actividades")
    .delete()
    .eq("id", seleccionada);

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  document.getElementById("modalEliminar").style.display = "none";

  seleccionada = null;

  document.getElementById("btnModificar").disabled = true;
  document.getElementById("btnEliminar").disabled = true;

  await cargarActividades();
};

/* ================= INICIO ================= */
cargarActividades();
</script>

</body>
</html>
